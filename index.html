<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="tituloAba"> Athos Contempladas — Use seu crédito agora, sem sorteio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde-cofre:#0E3B2E;
    --verde-musgo:#154335;
    --dourado:#C9A227;
    --dourado-claro:#E4C55C;
    --marfim:#F6F1E7;
    --marfim-2:#EFE8D8;
    --grafite:#17211B;
    --branco:#FFFFFF;
    --verde-linha: rgba(14,59,46,0.12);

    --f-display: 'Space Grotesk', sans-serif;
    --f-texto: 'Inter', sans-serif;
    --f-dados: 'IBM Plex Mono', monospace;

    --raio: 14px;
    --sombra: 0 20px 50px -20px rgba(14,59,46,0.35);
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:var(--f-texto); color:var(--grafite); background:var(--marfim); line-height:1.5; -webkit-font-smoothing:antialiased;}
  img{max-width:100%; display:block;}
  a{color:inherit; text-decoration:none;}
  ul{list-style:none;}
  button{font-family:inherit; cursor:pointer;}
  .container{width:100%; max-width:1180px; margin:0 auto; padding:0 24px;}
  .eyebrow{font-family:var(--f-dados); text-transform:uppercase; letter-spacing:.14em; font-size:.72rem; color:var(--dourado);}
  h1,h2,h3{font-family:var(--f-display); line-height:1.08; font-weight:600;}
  h1{font-size:clamp(2.3rem,5vw,3.6rem); letter-spacing:-0.01em;}
  h2{font-size:clamp(1.8rem,3.4vw,2.5rem); letter-spacing:-0.01em;}
  h3{font-size:1.2rem;}
  p{color:#3B463F;}
  .btn{display:inline-flex; align-items:center; gap:10px; padding:14px 26px; border-radius:999px; font-weight:600; font-size:.95rem; border:1px solid transparent; transition:transform .18s ease, box-shadow .18s ease, background .18s ease;}
  .btn:focus-visible{outline:3px solid var(--dourado); outline-offset:3px;}
  .btn-primario{background:var(--dourado); color:var(--verde-cofre);}
  .btn-primario:hover{transform:translateY(-2px); box-shadow:0 12px 24px -10px rgba(201,162,39,.6);}
  .btn-secundario{background:transparent; color:var(--marfim); border-color:rgba(246,241,231,.35);}
  .btn-secundario:hover{background:rgba(246,241,231,.1); transform:translateY(-2px);}
  .btn-outline-escuro{background:transparent; color:var(--verde-cofre); border-color:var(--verde-cofre);}
  .btn-outline-escuro:hover{background:var(--verde-cofre); color:var(--marfim);}

  header{position:sticky; top:0; z-index:50; background:rgba(14,59,46,.92); backdrop-filter:blur(8px); border-bottom:1px solid rgba(246,241,231,.08);}
  .nav{display:flex; align-items:center; justify-content:space-between; padding:16px 0;}
  .logo{display:flex; align-items:center; gap:10px; font-family:var(--f-display); font-weight:700; color:var(--marfim); font-size:1.05rem;}
  .logo-mark{width:34px; height:34px; border-radius:8px; background:linear-gradient(155deg,var(--dourado-claro),var(--dourado)); display:flex; align-items:center; justify-content:center; color:var(--verde-cofre); font-weight:700; font-size:.95rem;}
  .nav-links{display:flex; gap:28px; align-items:center;}
  .nav-links a{color:var(--marfim); font-size:.92rem; opacity:.85; transition:opacity .15s;}
  .nav-links a:hover{opacity:1;}
  .nav-cta{display:flex; align-items:center; gap:14px;}
  .menu-toggle{display:none; background:none; border:none; color:var(--marfim); font-size:1.5rem;}
  @media(max-width:840px){
    .nav-links{position:absolute; top:100%; left:0; right:0; background:var(--verde-cofre); flex-direction:column; padding:18px 24px; gap:16px; display:none; border-bottom:1px solid rgba(246,241,231,.08);}
    .nav-links.aberto{display:flex;}
    .menu-toggle{display:block;}
    .nav-cta .btn-secundario{display:none;}
  }

  .hero{background:radial-gradient(120% 140% at 15% 0%, var(--verde-musgo), var(--verde-cofre) 60%); color:var(--marfim); padding:76px 0 90px; position:relative; overflow:hidden;}
  .hero::after{content:""; position:absolute; inset:0; background-image:radial-gradient(rgba(246,241,231,.06) 1px, transparent 1px); background-size:22px 22px; opacity:.5; pointer-events:none;}
  .hero-grid{display:grid; grid-template-columns:1.05fr .95fr; gap:56px; align-items:center; position:relative; z-index:1;}
  @media(max-width:920px){.hero-grid{grid-template-columns:1fr; text-align:center;}}
  .hero h1{margin:14px 0 18px;}
  .hero h1 em{font-style:normal; color:var(--dourado-claro);}
  .hero p.lead{max-width:520px; color:rgba(246,241,231,.82); font-size:1.05rem; margin-bottom:30px;}
  @media(max-width:920px){.hero p.lead{margin-left:auto; margin-right:auto;}}
  .hero-ctas{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:38px;}
  @media(max-width:920px){.hero-ctas{justify-content:center;}}
  .stat-row{display:flex; gap:28px; flex-wrap:wrap;}
  @media(max-width:920px){.stat-row{justify-content:center;}}
  .stat{font-family:var(--f-dados);}
  .stat b{display:block; font-size:1.4rem; color:var(--dourado-claro); font-family:var(--f-display);}
  .stat span{font-size:.76rem; color:rgba(246,241,231,.65); text-transform:uppercase; letter-spacing:.08em;}

  .carta{position:relative; margin:0 auto; max-width:400px; background:linear-gradient(160deg,#fffdf7,var(--marfim-2)); border-radius:18px; padding:26px 24px 22px; border:1px solid rgba(201,162,39,.5); box-shadow:var(--sombra); transform:rotate(3deg); color:var(--grafite);}
  .carta::before{content:""; position:absolute; inset:8px; border:1px dashed rgba(14,59,46,.25); border-radius:12px; pointer-events:none;}
  .carta-top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px;}
  .carta-selo{width:46px; height:46px; border-radius:50%; background:conic-gradient(from 180deg, var(--dourado), var(--dourado-claro), var(--dourado)); display:flex; align-items:center; justify-content:center; font-family:var(--f-display); font-weight:700; color:var(--verde-cofre); font-size:.75rem;}
  .carta-label{font-family:var(--f-dados); font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:#6b7268;}
  .carta-valor{font-family:var(--f-display); font-size:2.1rem; font-weight:700; color:var(--verde-cofre); margin:2px 0 16px;}
  .carta-linha{display:flex; justify-content:space-between; font-family:var(--f-dados); font-size:.78rem; padding:8px 0; border-top:1px solid rgba(14,59,46,.1);}
  .carta-linha span:first-child{color:#6b7268;}
  .carta-status{margin-top:16px; display:inline-flex; align-items:center; gap:7px; background:rgba(14,59,46,.08); color:var(--verde-cofre); padding:7px 14px; border-radius:999px; font-size:.75rem; font-weight:600;}
  .carta-status .ponto{width:7px; height:7px; border-radius:50%; background:#2f9e6f;}

  section{padding:88px 0;}
  .head-secao{max-width:640px; margin-bottom:52px;}
  .head-secao h2{margin-top:10px;}
  .head-secao p{margin-top:14px; font-size:1.02rem;}

  .grid-beneficios{display:grid; grid-template-columns:repeat(3,1fr); gap:22px;}
  @media(max-width:900px){.grid-beneficios{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:600px){.grid-beneficios{grid-template-columns:1fr;}}
  .card-beneficio{background:var(--branco); border:1px solid var(--verde-linha); border-radius:var(--raio); padding:28px 24px; transition:transform .2s ease, box-shadow .2s ease;}
  .card-beneficio:hover{transform:translateY(-4px); box-shadow:0 18px 34px -22px rgba(14,59,46,.35);}
  .icone-b{width:44px; height:44px; border-radius:10px; margin-bottom:16px; background:var(--verde-cofre); color:var(--dourado-claro); display:flex; align-items:center; justify-content:center; font-size:1.2rem;}
  .card-beneficio h3{margin-bottom:8px;}
  .card-beneficio p{font-size:.94rem;}

  .como-funciona{background:var(--verde-cofre); color:var(--marfim);}
  .como-funciona .head-secao p{color:rgba(246,241,231,.78);}
  .passos{display:grid; grid-template-columns:repeat(5,1fr); gap:18px;}
  @media(max-width:980px){.passos{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:560px){.passos{grid-template-columns:1fr;}}
  .passo{background:rgba(246,241,231,.05); border:1px solid rgba(246,241,231,.12); border-radius:var(--raio); padding:22px 18px; position:relative;}
  .passo-num{font-family:var(--f-dados); color:var(--dourado-claro); font-size:.8rem; margin-bottom:14px; display:block;}
  .passo h3{font-size:1rem; margin-bottom:8px;}
  .passo p{font-size:.86rem; color:rgba(246,241,231,.7);}

  .simulador-wrap{display:grid; grid-template-columns:1fr 1fr; gap:48px; align-items:center;}
  @media(max-width:900px){.simulador-wrap{grid-template-columns:1fr;}}
  .painel-sim{background:var(--branco); border:1px solid var(--verde-linha); border-radius:18px; padding:32px; box-shadow:var(--sombra);}
  .campo{margin-bottom:24px;}
  .campo label{display:flex; justify-content:space-between; font-size:.85rem; font-weight:600; margin-bottom:10px;}
  .campo label span{font-family:var(--f-dados); color:var(--verde-cofre); font-weight:600;}
  input[type="range"]{width:100%; accent-color:var(--dourado); height:6px;}
  .select-prazo{display:flex; gap:10px; flex-wrap:wrap;}
  .chip-prazo{padding:9px 16px; border-radius:999px; border:1px solid var(--verde-linha); font-size:.85rem; font-weight:600; background:var(--marfim);}
  .chip-prazo[aria-pressed="true"]{background:var(--verde-cofre); color:var(--marfim); border-color:var(--verde-cofre);}
  .chip-prazo:focus-visible{outline:3px solid var(--dourado); outline-offset:2px;}
  .resultado-sim{margin-top:6px; padding-top:22px; border-top:1px dashed var(--verde-linha); display:flex; justify-content:space-between; align-items:flex-end;}
  .resultado-sim .rot{font-size:.78rem; text-transform:uppercase; letter-spacing:.08em; color:#6b7268; font-family:var(--f-dados);}
  .resultado-sim .num{font-family:var(--f-display); font-size:2.1rem; color:var(--verde-cofre); font-weight:700;}
  .sim-nota{font-size:.75rem; color:#8a8f88; margin-top:14px;}

  .grid-depo{display:grid; grid-template-columns:repeat(3,1fr); gap:22px;}
  @media(max-width:900px){.grid-depo{grid-template-columns:1fr; max-width:520px; margin:0 auto;}}
  .card-depo{background:var(--branco); border:1px solid var(--verde-linha); border-radius:var(--raio); padding:26px 22px;}
  .estrelas{color:var(--dourado); letter-spacing:2px; margin-bottom:14px; font-size:.9rem;}
  .card-depo p.fala{font-size:.94rem; color:var(--grafite); margin-bottom:18px;}
  .depo-autor{display:flex; align-items:center; gap:10px;}
  .avatar-letra{width:38px; height:38px; border-radius:50%; background:var(--verde-cofre); color:var(--dourado-claro); display:flex; align-items:center; justify-content:center; font-family:var(--f-display); font-weight:700; font-size:.9rem;}
  .depo-autor b{display:block; font-size:.88rem;}
  .depo-autor span{font-size:.76rem; color:#6b7268;}

  .faq-lista{max-width:760px;}
  .faq-item{border-bottom:1px solid var(--verde-linha);}
  .faq-pergunta{width:100%; background:none; border:none; text-align:left; display:flex; justify-content:space-between; align-items:center; padding:22px 4px; font-family:var(--f-display); font-size:1.02rem; color:var(--grafite);}
  .faq-pergunta:focus-visible{outline:3px solid var(--dourado); outline-offset:-2px;}
  .faq-plus{font-size:1.3rem; color:var(--dourado); transition:transform .25s ease; flex:none; margin-left:16px;}
  .faq-item[data-aberto="true"] .faq-plus{transform:rotate(45deg);}
  .faq-resposta{max-height:0; overflow:hidden; transition:max-height .3s ease;}
  .faq-resposta p{padding:0 4px 20px; font-size:.94rem; max-width:640px;}

  .cta-final{background:linear-gradient(135deg,var(--verde-cofre),var(--verde-musgo)); color:var(--marfim); text-align:center; border-radius:24px; padding:64px 32px; max-width:1132px; margin:0 auto;}
  .cta-final h2{margin-bottom:14px;}
  .cta-final p{color:rgba(246,241,231,.8); max-width:520px; margin:0 auto 30px;}
  .cta-final .hero-ctas{justify-content:center;}

  .insta-strip{background:var(--marfim-2);}
  .insta-head{display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px; margin-bottom:30px;}
  .insta-head .btn{white-space:nowrap;}
  .grid-insta{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  @media(max-width:760px){.grid-insta{grid-template-columns:repeat(2,1fr);}}
  .insta-tile{aspect-ratio:1/1; border-radius:12px; overflow:hidden; position:relative; background:linear-gradient(150deg,var(--verde-musgo),var(--verde-cofre)); display:flex; align-items:center; justify-content:center; color:rgba(246,241,231,.6); font-size:1.6rem;}
  .insta-tile span{position:absolute; bottom:10px; left:12px; font-family:var(--f-dados); font-size:.68rem; color:rgba(246,241,231,.75);}

  footer{background:var(--verde-cofre); color:rgba(246,241,231,.75); padding:56px 0 28px;}
  .footer-grid{display:grid; grid-template-columns:1.4fr 1fr 1fr; gap:40px; margin-bottom:44px;}
  @media(max-width:760px){.footer-grid{grid-template-columns:1fr; gap:32px;}}
  .footer-grid h4{color:var(--marfim); font-family:var(--f-display); font-size:.95rem; margin-bottom:16px;}
  .footer-grid li{margin-bottom:10px; font-size:.9rem;}
  .footer-grid a:hover{color:var(--dourado-claro);}
  .footer-baixo{border-top:1px solid rgba(246,241,231,.12); padding-top:22px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; font-size:.78rem; color:rgba(246,241,231,.5);}

  .flutuante{position:fixed; right:22px; bottom:22px; z-index:60; width:58px; height:58px; border-radius:50%; background:#25D366; color:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 14px 28px -10px rgba(0,0,0,.35); font-size:1.5rem;}
  .flutuante:hover{transform:scale(1.06);}
  .flutuante:focus-visible{outline:3px solid var(--dourado); outline-offset:3px;}

  @media (prefers-reduced-motion: reduce){*{transition:none !important; animation:none !important; scroll-behavior:auto !important;}}
</style>
</head>
<body>

<header>
  <div class="container nav">
    <a href="#topo" class="logo"><span class="logo-mark" id="logoIniciais">CC</span><span id="navNomeEmpresa"></span></a>
    <nav class="nav-links" id="menuLinks">
      <a href="#beneficios">Benefícios</a>
      <a href="#como-funciona">Como funciona</a>
      <a href="#simulador">Simulador</a>
      <a href="#depoimentos">Depoimentos</a>
      <a href="#faq">Dúvidas</a>
    </nav>
    <div class="nav-cta">
      <a href="#simulador" class="btn btn-secundario">Simular agora</a>
      <a id="linkWhatsappHeader" href="#" target="_blank" class="btn btn-primario">Falar no WhatsApp</a>
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu" aria-expanded="false">☰</button>
    </div>
  </div>
</header>

<main id="topo">

  <section class="hero">
    <div class="container hero-grid">
      <div>
        <span class="eyebrow" id="heroEyebrow"></span>
        <h1 id="heroTitulo"></h1>
        <p class="lead" id="heroSubtitulo"></p>
        <div class="hero-ctas">
          <a id="linkWhatsappHero" href="#" target="_blank" class="btn btn-primario" id="heroCtaPrimarioTexto"></a>
          <a href="#como-funciona" class="btn btn-secundario" id="heroCtaSecundarioTexto"></a>
        </div>
        <div class="stat-row" id="heroStats"></div>
      </div>

      <div class="carta" aria-hidden="true">
        <div class="carta-top">
          <div>
            <span class="carta-label" id="cartaLabel"></span>
            <div class="carta-valor" id="cartaValor"></div>
          </div>
          <div class="carta-selo" id="cartaSelo"></div>
        </div>
        <div class="carta-linha"><span id="cartaLinha1Label"></span><span id="cartaLinha1Valor"></span></div>
        <div class="carta-linha"><span id="cartaLinha2Label"></span><span id="cartaLinha2Valor"></span></div>
        <div class="carta-linha"><span id="cartaLinha3Label"></span><span id="cartaLinha3Valor"></span></div>
        <div class="carta-status"><span class="ponto"></span> <span id="cartaStatusTexto"></span></div>
      </div>
    </div>
  </section>

  <section id="beneficios">
    <div class="container">
      <div class="head-secao">
        <span class="eyebrow" id="beneficiosEyebrow"></span>
        <h2 id="beneficiosTitulo"></h2>
        <p id="beneficiosTexto"></p>
      </div>
      <div class="grid-beneficios" id="gridBeneficios"></div>
    </div>
  </section>

  <section id="como-funciona" class="como-funciona">
    <div class="container">
      <div class="head-secao">
        <span class="eyebrow" id="passosEyebrow"></span>
        <h2 id="passosTitulo"></h2>
        <p id="passosTexto"></p>
      </div>
      <div class="passos" id="gridPassos"></div>
    </div>
  </section>

  <section id="simulador">
    <div class="container simulador-wrap">
      <div>
        <span class="eyebrow" id="simEyebrow"></span>
        <h2 id="simTitulo"></h2>
        <p id="simTexto"></p>
      </div>

      <div class="painel-sim">
        <div class="campo">
          <label for="rangeValor"><span id="simLabelValor"></span> <span id="labelValor"></span></label>
          <input type="range" id="rangeValor" min="20000" max="500000" step="5000" value="180000">
        </div>
        <div class="campo">
          <label id="simLabelPrazo"></label>
          <div class="select-prazo" role="group" aria-label="Escolha do prazo em meses" id="gridPrazos"></div>
        </div>
        <div class="resultado-sim">
          <div>
            <div class="rot" id="simLabelResultado"></div>
            <div class="num" id="resultadoParcela"></div>
          </div>
          <a id="linkWhatsappSim" href="#" target="_blank" class="btn btn-outline-escuro" id="simCtaTexto"></a>
        </div>
        <p class="sim-nota" id="simNota"></p>
      </div>
    </div>
  </section>

  <section id="depoimentos" style="background:var(--marfim-2)">
    <div class="container">
      <div class="head-secao">
        <span class="eyebrow" id="depoEyebrow"></span>
        <h2 id="depoTitulo"></h2>
      </div>
      <div class="grid-depo" id="gridDepoimentos"></div>
    </div>
  </section>

  <section id="faq">
    <div class="container">
      <div class="head-secao">
        <span class="eyebrow" id="faqEyebrow"></span>
        <h2 id="faqTitulo"></h2>
      </div>
      <div class="faq-lista" id="listaFaq"></div>
    </div>
  </section>

  <section>
    <div class="cta-final">
      <span class="eyebrow" id="ctaFinalEyebrow"></span>
      <h2 id="ctaFinalTitulo"></h2>
      <p id="ctaFinalTexto"></p>
      <div class="hero-ctas">
        <a id="linkWhatsappCta" href="#" target="_blank" class="btn btn-primario" id="ctaFinalBotao1"></a>
        <a id="linkInstagramCta" href="#" target="_blank" class="btn btn-secundario" id="ctaFinalBotao2"></a>
      </div>
    </div>
  </section>

  <section class="insta-strip">
    <div class="container">
      <div class="insta-head">
        <div>
          <span class="eyebrow" id="instaEyebrow"></span>
          <h2 style="margin-top:8px;" id="instaTitulo"></h2>
        </div>
        <a id="linkInstagramStrip" href="#" target="_blank" class="btn btn-outline-escuro" id="instaBotao"></a>
      </div>
      <!-- Placeholders visuais: troque por <img src="..."> quando tiver os posts reais -->
      <div class="grid-insta" id="gridInsta"></div>
    </div>
  </section>

</main>

<footer>
  <div class="container">
    <div class="footer-grid">
      <div>
        <h4 id="footerNome"></h4>
        <p style="max-width:320px; font-size:.88rem; color:rgba(246,241,231,.65);" id="footerDescricao"></p>
      </div>
      <div>
        <h4 id="footerNavTitulo"></h4>
        <ul>
          <li><a href="#beneficios">Benefícios</a></li>
          <li><a href="#como-funciona">Como funciona</a></li>
          <li><a href="#simulador">Simulador</a></li>
          <li><a href="#faq">Dúvidas frequentes</a></li>
        </ul>
      </div>
      <div>
        <h4 id="footerContatoTitulo"></h4>
        <ul>
          <li id="footerTelefone"></li>
          <li id="footerEmail"></li>
          <li><a id="linkInstagramFooter" href="#" target="_blank">Instagram</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-baixo">
